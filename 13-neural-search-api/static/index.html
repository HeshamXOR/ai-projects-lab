<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Neural Search</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #181b24;
      --border: #272b38;
      --text: #e6e8ee;
      --muted: #8b90a0;
      --accent: #6c8cff;
      --accent-soft: #20283f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap { max-width: 820px; margin: 0 auto; padding: 40px 20px 80px; }
    h1 { font-size: 26px; margin: 0 0 4px; }
    .sub { color: var(--muted); margin: 0 0 28px; font-size: 14px; }
    .searchbar { display: flex; gap: 10px; margin-bottom: 14px; }
    input[type="text"] {
      flex: 1; padding: 12px 14px; font-size: 15px;
      background: var(--panel); color: var(--text);
      border: 1px solid var(--border); border-radius: 10px; outline: none;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    button {
      padding: 12px 20px; font-size: 15px; font-weight: 600;
      background: var(--accent); color: #fff; border: none;
      border-radius: 10px; cursor: pointer;
    }
    button:hover { filter: brightness(1.08); }
    .controls { display: flex; gap: 14px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
    .controls label { font-size: 13px; color: var(--muted); display: flex; gap: 6px; align-items: center; }
    .controls input[type="number"], .controls input[type="text"].small {
      width: 80px; padding: 6px 8px; background: var(--panel); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
    }
    .controls input.filter { width: 200px; }
    .result {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 18px; margin-bottom: 12px;
    }
    .result .top { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
    .result .id { font-weight: 600; color: var(--accent); }
    .result .score {
      font-size: 12px; color: var(--muted); background: var(--accent-soft);
      padding: 2px 8px; border-radius: 999px; white-space: nowrap;
    }
    .result .text { margin: 8px 0 6px; }
    .result .meta { font-size: 12px; color: var(--muted); font-family: ui-monospace, monospace; }
    .status { color: var(--muted); font-size: 14px; margin: 8px 0 18px; min-height: 20px; }
    .seed { font-size: 13px; color: var(--accent); cursor: pointer; text-decoration: underline; background: none; border: none; padding: 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Neural Search</h1>
    <p class="sub">Hybrid retrieval &mdash; from-scratch HNSW (semantic) + BM25 (lexical), fused with reciprocal-rank fusion.</p>

    <div class="searchbar">
      <input id="q" type="text" placeholder="Search&hellip;" autocomplete="off" />
      <button id="go">Search</button>
    </div>

    <div class="controls">
      <label>k <input id="k" type="number" value="10" min="1" max="100" /></label>
      <label>offset <input id="offset" type="number" value="0" min="0" /></label>
      <label>limit <input id="limit" type="number" value="10" min="1" max="100" /></label>
      <label>filter (k=v) <input id="filter" class="small filter" type="text" placeholder="category=tech" /></label>
      <button class="seed" id="seed" type="button">load sample docs</button>
    </div>

    <div class="status" id="status"></div>
    <div id="results"></div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    function parseFilter(raw) {
      raw = raw.trim();
      if (!raw) return null;
      const eq = raw.indexOf("=");
      if (eq === -1) return null;
      const key = raw.slice(0, eq).trim();
      const val = raw.slice(eq + 1).trim();
      if (!key) return null;
      return { [key]: val };
    }

    async function runSearch() {
      const query = $("q").value.trim();
      if (!query) { $("status").textContent = "Type a query first."; return; }
      const body = {
        query,
        k: parseInt($("k").value || "10", 10),
        offset: parseInt($("offset").value || "0", 10),
        limit: parseInt($("limit").value || "10", 10),
        filter: parseFilter($("filter").value),
      };
      $("status").textContent = "Searching…";
      try {
        const res = await fetch("/search", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        if (!res.ok) { $("status").textContent = "Error: " + res.status; return; }
        const data = await res.json();
        renderResults(data);
      } catch (e) {
        $("status").textContent = "Request failed: " + e;
      }
    }

    function renderResults(data) {
      const box = $("results");
      box.innerHTML = "";
      $("status").textContent =
        `${data.total} match(es) · showing offset ${data.offset}, limit ${data.limit}`;
      if (!data.results.length) {
        box.innerHTML = '<p class="sub">No results.</p>';
        return;
      }
      for (const r of data.results) {
        const el = document.createElement("div");
        el.className = "result";
        const meta = Object.keys(r.metadata || {}).length
          ? JSON.stringify(r.metadata) : "";
        el.innerHTML =
          `<div class="top"><span class="id">${escapeHtml(r.id)}</span>` +
          `<span class="score">score ${r.score.toFixed(5)}</span></div>` +
          `<div class="text">${escapeHtml(r.text)}</div>` +
          (meta ? `<div class="meta">${escapeHtml(meta)}</div>` : "");
        box.appendChild(el);
      }
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    async function seed() {
      const documents = [
        { id: "d1", text: "The quick brown fox jumps over the lazy dog", metadata: { category: "animals" } },
        { id: "d2", text: "Neural networks learn representations from data", metadata: { category: "tech" } },
        { id: "d3", text: "Vector databases power semantic search systems", metadata: { category: "tech" } },
        { id: "d4", text: "A balanced diet includes fruits and vegetables", metadata: { category: "health" } },
        { id: "d5", text: "Transformers revolutionized natural language processing", metadata: { category: "tech" } },
        { id: "d6", text: "The dog ran quickly across the green field", metadata: { category: "animals" } },
      ];
      $("status").textContent = "Indexing sample docs…";
      const res = await fetch("/index", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ documents }),
      });
      const data = await res.json();
      $("status").textContent = `Indexed ${data.indexed} docs (total ${data.total_docs}). Try "semantic search" or "dog".`;
    }

    $("go").addEventListener("click", runSearch);
    $("q").addEventListener("keydown", (e) => { if (e.key === "Enter") runSearch(); });
    $("seed").addEventListener("click", seed);
  </script>
</body>
</html>
